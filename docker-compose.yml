name: carmel-intranet

services:
  intranet:
    build: .
    container_name: carmel-intranet
    restart: unless-stopped
    env_file: .env
    ports:
      - "${PORT:-5000}:5000"
    networks:
      - carmel-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.intranet.rule=Host(`intranet.carmel.local`)"
      - "traefik.http.services.intranet.loadbalancer.server.port=5000"

networks:
  carmel-net:
    external: true
