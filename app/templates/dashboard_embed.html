{% extends "base.html" %}
{% block title %}{{ dashboard.name }} - Intranet Carmel{% endblock %}

{% block content %}
<div class="embed-page">

  <div class="embed-header d-flex justify-content-between align-items-center mb-2">
    <div>
      <div class="embed-breadcrumb">
        Área de BI / {{ dashboard.sector }}
      </div>
      <h3 class="embed-title mb-0">
        {{ dashboard.name }}
      </h3>
    </div>

    <a href="{{ url_for('main.area_bi') }}" class="btn btn-outline-light btn-sm">
      Voltar
    </a>
  </div>

  <div class="embed-wrapper">
    <iframe
      src="{{ dashboard.url }}"
      frameborder="0"
      allowfullscreen="true"
      sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-popups-to-escape-sandbox"
      class="embed-iframe">
    </iframe>
  </div>

</div>
{% endblock %}
