<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Intranet Carmel{% endblock %}</title>

  <!-- Bootstrap CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
  >

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <!-- CSS do projeto -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- Vídeo de fundo -->
  <div class="video-bg">
    <video autoplay muted loop playsinline>
      <source src="{{ url_for('static', filename='video/carmel-bg.mp4') }}" type="video/mp4">
    </video>
  </div>

  <!-- Navbar -->
  <nav class="navbar navbar-dark navbar-expand-lg compact-nav">
    <div class="container-fluid">

      <a class="navbar-brand d-flex align-items-center" href="{{ url_for('main.area_bi') }}">
        <img
          src="{{ url_for('static', filename='img/logo-carmel.png') }}"
          class="navbar-logo me-2"
          alt="Carmel"
        >
        <span class="brand-text">Intranet Carmel</span>
      </a>

      <div class="d-flex align-items-center ms-auto gap-2">
        {% if current_user.is_authenticated %}

          <a href="{{ url_for('vendas.index') }}" class="btn btn-outline-light btn-sm">
            Vendas
          </a>

          {% if current_user.is_admin %}
            <a href="{{ url_for('admin.index') }}" class="btn btn-outline-light btn-sm">
              Administração
            </a>
          {% endif %}

          <span class="me-2 user-name">
            {{ current_user.name }}
          </span>

          <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-light btn-sm">
            Sair
          </a>
        {% endif %}
      </div>

    </div>
  </nav>

  <!-- Conteúdo -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- ✅ Bootstrap JS (ESSENCIAL para accordion funcionar) -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
  </script>

</body>
</html>
